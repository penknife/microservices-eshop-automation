services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────

  kafka:
    image: bitnami/kafka:3.7
    container_name: eshop-kafka
    environment:
      # KRaft mode — no Zookeeper
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: eshop-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped

  postgres-orders:
    image: postgres:16
    container_name: eshop-postgres-orders
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-orders-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres-payments:
    image: postgres:16
    container_name: eshop-postgres-payments
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres-notifications:
    image: postgres:16
    container_name: eshop-postgres-notifications
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-notifications-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── Application Services ───────────────────────────────────────────────────

  order-service:
    build:
      context: .
      dockerfile: src/Services/Order/Order.Api/Dockerfile
    container_name: eshop-order-service
    ports:
      - "8081:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-orders:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres-orders;Port=5432;Database=orders;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__ConsumerGroupId: "order-service"
      Kafka__OutboxPollingIntervalSeconds: "2"
      Database__AutoMigrate: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: src/Services/Payment/Payment.Service/Dockerfile
    container_name: eshop-payment-service
    ports:
      - "8082:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-payments:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres-payments;Port=5432;Database=payments;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__ConsumerGroupId: "payment-service"
      Kafka__OutboxPollingIntervalSeconds: "2"
      Payment__FailureThreshold: "999999.99"
      Database__AutoMigrate: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: src/Services/Notification/Notification.Service/Dockerfile
    container_name: eshop-notification-service
    ports:
      - "8083:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-notifications:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres-notifications;Port=5432;Database=notifications;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__ConsumerGroupId: "notification-service"
      Database__AutoMigrate: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  postgres-audit:
    image: postgres:16
    container_name: eshop-postgres-audit
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-audit-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d audit"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  audit-service:
    build:
      context: .
      dockerfile: src/Services/Audit/Audit.Service/Dockerfile
    container_name: eshop-audit-service
    ports:
      - "8084:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-audit:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres-audit;Port=5432;Database=audit;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:9092"
      Kafka__ConsumerGroupId: "audit-service"
      Database__AutoMigrate: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  kafka-data:
  postgres-orders-data:
  postgres-payments-data:
  postgres-notifications-data:
  postgres-audit-data:
